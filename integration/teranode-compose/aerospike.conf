# Aerospike configuration for Teranode regtest integration testing.
# Smaller filesize than production since regtest has minimal data.

service {
	cluster-name docker
	sindex-builder-threads 8
}

logging {
	console {
		context any info
	}
}

network {
	service {
		address any
		port 3000
	}

	heartbeat {
		mode mesh
		address any
		port 3002
		interval 150
		timeout 10
	}

	fabric {
		address any
		port 3001
	}
}

namespace utxo-store {
    stop-writes-sys-memory-pct 90

    default-ttl           0
    nsup-period           120
    nsup-threads          1
    transaction-pending-limit 0

    replication-factor    1
    partition-tree-sprigs 4096

    storage-engine device {
        file              /opt/aerospike/data/utxostore.dat
        filesize          4G

        flush-size 128K
        post-write-cache 256
        defrag-lwm-pct 50
        defrag-sleep 2000
        evict-used-pct 70
        read-page-cache true
        flush-max-ms 1000
        sindex-startup-device-scan true
        max-write-cache 512M
    }
}
