# Teranode regtest configuration for Runar integration tests.
# All settings use the .docker.m namespace to override defaults.
# These match the SV Node regtest settings in regtest.sh.

# Network
network.docker.m = regtest

# RPC credentials (match BSV SV Node regtest defaults)
rpc_user.docker.m = bitcoin
rpc_pass.docker.m = bitcoin

# Policy overrides — 0 means unlimited (same as SV Node regtest)
maxscriptsizepolicy.docker.m = 0
maxscriptnumlengthpolicy.docker.m = 0
maxtxsizepolicy.docker.m = 0
maxstackmemoryusageconsensus.docker.m = 100000000
maxstackmemoryusagepolicy.docker.m = 100000000

# Mining fee
minminingtxfee.docker.m = 0

# Longer RPC timeout for mining 10001 blocks (Genesis activation on regtest)
rpc_timeout.docker.m = 600s
