name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typescript:
    name: TypeScript (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: compilers/go/go.sum
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run test
      - run: npx vitest run examples/ts/
      - run: pnpm run typecheck

  go:
    name: Go Compiler
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: compilers/go/go.sum
      - run: cd compilers/go && go build ./...
      - run: cd compilers/go && go build -o runar-go .
      - run: cd compilers/go && go test -race -v ./...
      - uses: actions/upload-artifact@v4
        with:
          name: runar-go
          path: compilers/go/runar-go

  rust:
    name: Rust Compiler
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cd compilers/rust && cargo build --release
      - run: cd compilers/rust && cargo test
      - uses: actions/upload-artifact@v4
        with:
          name: runar-rust
          path: compilers/rust/target/release/runar-compiler-rust

  python:
    name: Python Compiler
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pytest
      - run: cd compilers/python && python -m pytest tests/ -v

  conformance:
    name: Conformance Tests
    needs: [typescript, go, rust, python]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: runar-go
      - uses: actions/download-artifact@v4
        with:
          name: runar-rust
      - run: chmod +x runar-go runar-compiler-rust
      - name: Run conformance tests
        run: |
          fail=0
          for test in conformance/tests/*/expected-ir.json; do
            dir=$(dirname "$test")
            name=$(basename "$dir")
            echo -n "=== $name === "
            go_hex=$(./runar-go --ir "$test" --hex)
            rust_hex=$(./runar-compiler-rust --ir "$test" --hex)
            if [ "$go_hex" != "$rust_hex" ]; then
              echo "MISMATCH (Go: ${#go_hex} chars, Rust: ${#rust_hex} chars)"
              fail=1
            else
              echo "OK (${#go_hex} hex chars)"
            fi
          done
          exit $fail
