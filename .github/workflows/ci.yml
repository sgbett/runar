name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typescript:
    name: TypeScript (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run test
      - run: npx vitest run examples/
      - run: pnpm run typecheck

  go:
    name: Go Compiler
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: compilers/go/go.sum
      - run: cd compilers/go && go build ./...
      - run: cd compilers/go && go build -o tsop-go .
      - run: cd compilers/go && go test -race -v ./...
      - uses: actions/upload-artifact@v4
        with:
          name: tsop-go
          path: compilers/go/tsop-go

  rust:
    name: Rust Compiler
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cd compilers/rust && cargo build --release
      - run: cd compilers/rust && cargo test
      - uses: actions/upload-artifact@v4
        with:
          name: tsop-rust
          path: compilers/rust/target/release/tsop-compiler-rust

  conformance:
    name: Conformance Tests
    needs: [typescript, go, rust]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: tsop-go
      - uses: actions/download-artifact@v4
        with:
          name: tsop-rust
      - run: chmod +x tsop-go tsop-compiler-rust
      - name: Run conformance tests
        run: |
          fail=0
          for test in conformance/tests/*/expected-ir.json; do
            dir=$(dirname "$test")
            name=$(basename "$dir")
            echo "=== $name ==="
            go_hex=$(./tsop-go --ir "$test" --hex)
            rust_hex=$(./tsop-compiler-rust --ir "$test" --hex)
            echo "  Go:   $go_hex"
            echo "  Rust: $rust_hex"
            if [ "$go_hex" != "$rust_hex" ]; then
              echo "  MISMATCH between Go and Rust for $name"
              fail=1
            else
              echo "  OK"
            fi
          done
          exit $fail
